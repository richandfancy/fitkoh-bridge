name = "fitkoh-bridge"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Routes
routes = [
  { pattern = "bridge.fitkoh.app/*", zone_name = "fitkoh.app" },
]

[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/docs", "/docs/*", "/mcp", "/mcp/*"]

[vars]
APP_NAME = "FitKoh Bridge"
ENVIRONMENT = "production"

# Cron Triggers — pre-warm poster_meals_cache every minute so user-facing
# /api/v1/meals/:posterClientId requests always hit fresh cache.
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "fitkoh-bridge-db"
database_id = "placeholder-will-be-set-after-creation"
migrations_dir = "../migrations"

[[kv_namespaces]]
binding = "CONFIG"
id = "placeholder-will-be-set-after-creation"

# Staging environment
[env.staging]
name = "fitkoh-bridge-staging"
routes = [
  { pattern = "s.bridge.fitkoh.app/*", zone_name = "fitkoh.app" },
]
vars = { APP_NAME = "FitKoh Bridge (Staging)", ENVIRONMENT = "staging" }

[env.staging.assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/docs", "/docs/*", "/mcp", "/mcp/*"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "fitkoh-bridge-db-staging"
database_id = "placeholder-will-be-set-after-creation"
migrations_dir = "../migrations"

[[env.staging.kv_namespaces]]
binding = "CONFIG"
id = "placeholder-will-be-set-after-creation"

[env.staging.triggers]
crons = ["* * * * *"]
