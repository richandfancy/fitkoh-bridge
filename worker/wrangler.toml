name = "fitkoh-bridge"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Routes
routes = [
  { pattern = "bridge.fitkoh.app/*", zone_name = "fitkoh.app" },
]

[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/docs", "/docs/*", "/mcp", "/mcp/*", "/sw.js", "/manifest.json"]

[vars]
APP_NAME = "FitKoh Bridge"
ENVIRONMENT = "production"

# Cron Triggers — pre-warm poster_meals_cache every minute so user-facing
# /api/v1/meals/:posterClientId requests always hit fresh cache.
[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "fitkoh-bridge-db"
database_id = "896d6a5c-df01-48b7-8a0f-9e25a7d4ae9e"
migrations_dir = "../migrations"

[[kv_namespaces]]
binding = "CONFIG"
id = "96cbde7122194eb185551a8bb2a81640"

# Staging environment
[env.staging]
name = "fitkoh-bridge-staging"
routes = [
  { pattern = "bridge-staging.fitkoh.app/*", zone_name = "fitkoh.app" },
]
vars = { APP_NAME = "FitKoh Bridge (Staging)", ENVIRONMENT = "staging" }

[env.staging.assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/docs", "/docs/*", "/mcp", "/mcp/*", "/sw.js", "/manifest.json"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "fitkoh-bridge-db-staging"
database_id = "523a0a4e-8eb1-41bf-ad42-466953304f6a"
migrations_dir = "../migrations"

[[env.staging.kv_namespaces]]
binding = "CONFIG"
id = "4bb9ed8ac873450cb281b5961841c579"

[env.staging.triggers]
crons = ["* * * * *"]
